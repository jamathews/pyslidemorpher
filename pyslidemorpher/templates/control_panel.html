<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PySlidemorpher Control Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-group h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        .control-item {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 14px;
        }

        .value-display {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: bold;
            margin-left: 10px;
            min-width: 50px;
            text-align: center;
        }

        .command-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .command-buttons {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 PySlidemorpher Control Panel</h1>

        <div class="controls-grid">
            <!-- Performance Settings -->
            <div class="control-group">
                <h3>⚡ Performance</h3>
                <div class="control-item">
                    <label for="fps">FPS (Frames Per Second)</label>
                    <input type="range" id="fps" min="10" max="120" value="30">
                    <span class="value-display" id="fps-value">30</span>
                </div>
                <div class="control-item">
                    <label for="pixel-size">Pixel Size</label>
                    <input type="range" id="pixel-size" min="1" max="20" value="4">
                    <span class="value-display" id="pixel-size-value">4</span>
                </div>
            </div>

            <!-- Timing Settings -->
            <div class="control-group">
                <h3>⏱️ Timing</h3>
                <div class="control-item">
                    <label for="seconds-per-transition">Seconds Per Transition</label>
                    <input type="range" id="seconds-per-transition" min="0.5" max="10" step="0.1" value="2.0">
                    <span class="value-display" id="seconds-per-transition-value">2.0s</span>
                </div>
                <div class="control-item">
                    <label for="hold">Hold Time</label>
                    <input type="range" id="hold" min="0" max="5" step="0.1" value="0.5">
                    <span class="value-display" id="hold-value">0.5s</span>
                </div>
            </div>

            <!-- Visual Effects -->
            <div class="control-group">
                <h3>🎨 Visual Effects</h3>
                <div class="control-item">
                    <label for="transition">Transition Type</label>
                    <select id="transition">
                        <option value="default">Default</option>
                        <option value="swarm">Swarm</option>
                        <option value="tornado">Tornado</option>
                        <option value="swirl">Swirl</option>
                        <option value="drip">Drip</option>
                        <option value="rain">Rain</option>
                        <option value="sorted">Sorted</option>
                        <option value="hue-sorted">Hue Sorted</option>
                        <option value="random">Random</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="easing">Easing Function</label>
                    <select id="easing">
                        <option value="linear">Linear</option>
                        <option value="smoothstep">Smooth Step</option>
                        <option value="cubic">Cubic</option>
                    </select>
                </div>
            </div>

            <!-- Audio Settings -->
            <div class="control-group">
                <h3>🔊 Audio</h3>
                <div class="control-item">
                    <div class="checkbox-container">
                        <input type="checkbox" id="reactive">
                        <label for="reactive">Reactive Mode</label>
                    </div>
                </div>
                <div class="control-item">
                    <label for="audio-threshold">Audio Threshold</label>
                    <input type="range" id="audio-threshold" min="0" max="1" step="0.01" value="0.1">
                    <span class="value-display" id="audio-threshold-value">0.10</span>
                </div>
            </div>
        </div>

        <div class="command-buttons">
            <button onclick="sendCommand('pause')">⏸️ Pause</button>
            <button onclick="sendCommand('resume')">▶️ Resume</button>
            <button onclick="sendCommand('restart')">🔄 Restart</button>
            <button onclick="sendCommand('stop')">⏹️ Stop</button>
            <button onclick="sendCommand('next')">⏭️ Next</button>
            <button onclick="sendCommand('previous')">⏮️ Previous</button>
        </div>

        <div class="status-bar">
            <div id="status">Ready - Waiting for slideshow...</div>
        </div>
    </div>

    <script>
        // Global state
        let settings = {};

        // Initialize the interface
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            setupEventListeners();
            startStatusUpdates();
        });

        // Load current settings from server
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                settings = await response.json();
                updateUI();
            } catch (error) {
                console.error('Failed to load settings:', error);
                updateStatus('Error: Failed to connect to server');
            }
        }

        // Update UI elements with current settings
        function updateUI() {
            for (const [key, value] of Object.entries(settings)) {
                const element = document.getElementById(key.replace('_', '-'));
                if (element) {
                    if (element.type === 'checkbox') {
                        element.checked = value;
                    } else {
                        element.value = value;
                    }
                    updateValueDisplay(key.replace('_', '-'), value);
                }
            }
        }

        // Setup event listeners for all controls
        function setupEventListeners() {
            // Range inputs and selects
            const controls = ['fps', 'pixel-size', 'seconds-per-transition', 'hold', 
                            'transition', 'easing', 'audio-threshold'];

            controls.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.addEventListener('input', function() {
                        updateSetting(id.replace('-', '_'), this.value);
                        updateValueDisplay(id, this.value);
                    });
                }
            });

            // Checkbox
            document.getElementById('reactive').addEventListener('change', function() {
                updateSetting('reactive', this.checked);
            });
        }

        // Update value display for range inputs
        function updateValueDisplay(id, value) {
            const display = document.getElementById(id + '-value');
            if (display) {
                let displayValue = value;
                if (id === 'seconds-per-transition' || id === 'hold') {
                    displayValue = parseFloat(value).toFixed(1) + 's';
                } else if (id === 'audio-threshold') {
                    displayValue = parseFloat(value).toFixed(2);
                }
                display.textContent = displayValue;
            }
        }

        // Update a setting on the server
        async function updateSetting(key, value) {
            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({[key]: value})
                });

                if (response.ok) {
                    const result = await response.json();
                    settings[key] = value;
                    updateStatus(`Updated ${key} to ${value}`);
                } else {
                    updateStatus('Error: Failed to update setting');
                }
            } catch (error) {
                console.error('Failed to update setting:', error);
                updateStatus('Error: Connection failed');
            }
        }

        // Send a command to the slideshow
        async function sendCommand(command) {
            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({command: command})
                });

                if (response.ok) {
                    updateStatus(`Command sent: ${command}`);
                } else {
                    updateStatus('Error: Failed to send command');
                }
            } catch (error) {
                console.error('Failed to send command:', error);
                updateStatus('Error: Connection failed');
            }
        }

        // Update status message
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Start periodic status updates
        function startStatusUpdates() {
            setInterval(async () => {
                try {
                    const response = await fetch('/api/settings');
                    if (response.ok) {
                        updateStatus('Connected - Slideshow running');
                    } else {
                        updateStatus('Connection error');
                    }
                } catch (error) {
                    updateStatus('Disconnected');
                }
            }, 5000);
        }
    </script>
</body>
</html>
